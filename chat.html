<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
      :root {            
        --bg-color: #0f172a;            
       --accent-gradient: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);           
        --glass: rgba(255, 255, 255, 0.1);             
         --shadow: 0 20px 50px rgba(0, 0, 0, 0.5); 
          }         
              body {           
               margin: 0;            
               height: 100vh;           
               body {           
               margin: 0;            
               height: 100vh;           
            background-color: var(--bg-color);                 
           background-image: var(--accent-gradient);     
              font-family: 'Arial', sans-serif;    
               }   
                }       
               .card {           
                    position: absolute; 
                       transform: translate(-50%, -50%); /* Traditional centering method */                      
                       width: 320px;         
                      padding: 30px;         
                     background: var(--glass);        
                   border-radius: 20px;      
                        box-shadow: var(--shadow);     
                       text-align: center;     
                       color: white;        
                         overflow: hidden; /* Keeps the popup inside */         }                                                                          
                         .profile-pic {           
                        width: 100px;       
                        height: 100px;        
                  margin: 0 auto;     
                border-radius: 50%;      
             background-image: url('https://picsum.photos/id/64/200/200');    
          background-size: cover;            
           border: 3px solid rgba(255, 255, 255, 0.5);         }            
            .card > h1 {          margin: 15px 0 5px;           
              font-size: 1.5rem;         }         .card p {        font-size: 0.9rem;         }      
     .popup {            
          position: absolute; /* Positions */            
              bottom: -100%; /* Start off-screen */           
              left: 0;            
                width: 100%;          
    height: 100%;           
             background: rgba(15, 23, 42, 0.95); /* Alpha Values */       
                   transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); /* Transitions */         
                                       
               padding-top: 40px;         }         /* Triggering the popup via Pseudo-class */         
                  .card:hover .popup {          
                bottom: 0; /* Slide up on hover */         }  
                    </style> </head> <body>           
                        <div class="card">        
     <div class="profile-pic"></div>   
                  <h1>Creative Studio</h1>       
                 <p>Visual Design & Web Interaction</p>    
                       <a href="https://google.com" target="_blank">Search My Work</a>   
                           <button class="btn">Hello World</button>   
                              <div class="popup">      
                            <h2>Our Services</h2>        
                 <ul style="list-style: none; padding: 0;">    
                       <li>✓ UI/UX Design</li>     
                        <li>✓ CSS Animations</li>   
                         <li>✓ Web Development</li>       
                       </ul>         
                     <p style="margin-top: 20px; font-size: 0.7rem;">Slide out to close</p>      
                    </div>  
                    </div>
</style>


</head>
<body>
   
</body>
</html>
