<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #1d2b64;
  font-family: sans-serif;
}

.card {
  width: 300px;
  padding: 20px;
  border-radius: 15px;
  background: white;
  text-align: center;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  background: #00b894;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #019875;
}
    </style>
</head>
<body>
<div class="card">
  <img src="https://picsum.photos/300/200" alt="">
  <h2>Frontend Developer</h2>
  <p id="text">Beautiful view</p>
  <button onclick="changeText()">Click</button>
</div>

<script src="script.js">
    function changeText() {
  document.getElementById("text").innerText = "Button bosildi!";
}
</script>
</body>
</html>
</body>
</html>
